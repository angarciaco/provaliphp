name: Validar PR (Sintaxis, Estilo y Análisis Estático)

on:
  pull_request:
    branches:
      - main

jobs:
  validate_php:
    name: Revisión Completa de Código PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs, phpstan

      - name: 1. Verificación de Errores de Sintaxis (PHP Lint)
        # Atrapa errores fatales de escritura inmediatamente (ej. echo gotodate sin ;)
        run: find . -type f -name '*.php' -print0 | xargs -0 -n 1 -P 4 php -l

      - name: 2. Validar estándares PSR-12 con PHPCS
        # Verifica el formato visual y espaciado
        run: phpcs --standard=PSR12 --extensions=php .

      - name: 3. Análisis Estático con PHPStan
        # Inspecciona la lógica (ej. clases como DDateTime que no existen en el core)
        run: phpstan analyse . --level=5
